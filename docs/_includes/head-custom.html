<!-- Favicon kit — browsers pick the best match; ICO is the legacy fallback. -->
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/logo-32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/logo-16.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="64x64" href="{{ '/assets/logo-64.png' | relative_url }}">
<link rel="icon" type="image/x-icon" href="{{ '/assets/favicon.ico' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/logo-128.png' | relative_url }}">

<!-- Open Graph / social cards -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="RedGNAT">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:image" content="{{ '/assets/logo-512.png' | absolute_url }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ '/assets/logo-512.png' | absolute_url }}">

<!-- RedGNAT palette — overrides Cayman's default green gradient -->
<link rel="stylesheet" href="{{ '/assets/css/redgnat.css' | relative_url }}">
