site_name: RedGNAT
site_description: CART addon for GNAT. Safe red teaming made simple.
site_url: https://wrhalpin.github.io/RedGNAT/
repo_url: https://github.com/wrhalpin/RedGNAT
repo_name: wrhalpin/RedGNAT

theme:
  name: material
  logo: assets/logo/RedGNAT-logo.png
  favicon: assets/logo/RedGNAT-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Tutorials:
      - Overview: tutorials/README.md
      - Getting started: tutorials/getting-started.md
  - How-to guides:
      - Overview: how-to/README.md
      - Add a technique: how-to/add-technique.md
      - Configure GNAT integration: how-to/configure-gnat-integration.md
      - Deploy with Docker: how-to/deploy-docker.md
  - Reference:
      - Overview: reference/README.md
      - Configuration: reference/configuration.md
      - API: reference/api.md
      - Technique library: reference/techniques.md
  - Explanation:
      - Architecture: explanation/architecture/architecture.md
      - Engagement:
          - Safe-harbor model: explanation/engagement/safe-harbor.md
          - Phase 2 activation: explanation/engagement/phase2-activation.md
      - Automation:
          - Feedback loop: explanation/automation/feedback-loop.md
  - Releases:
      - v0.1.0: releases/v0.1.0.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
