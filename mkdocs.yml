site_name: RedGNAT
site_description: CART addon for GNAT. Safe red teaming made simple.
site_url: https://wrhalpin.github.io/RedGNAT/
repo_url: https://github.com/wrhalpin/RedGNAT
repo_name: wrhalpin/RedGNAT

theme:
  name: material
  logo: assets/logo/RedGNAT-logo.png
  favicon: assets/logo/RedGNAT-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Tutorials:
      - Getting started: tutorials/getting-started.md
  - How-to guides:
      - Add a technique: how-to/add-technique.md
      - Configure GNAT integration: how-to/configure-gnat-integration.md
      - Deploy with Docker: how-to/deploy-docker.md
  - Reference:
      - Configuration: reference/configuration.md
      - API: reference/api.md
  - Explanation:
      - Architecture: explanation/architecture.md
      - Safe-harbor model: explanation/safe-harbor.md
      - Phase 2 activation: explanation/phase2-activation.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
